<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Замок Хаоса — Tower Defense</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #game-container {
            position: relative;
        }
        #game-container canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <!-- Pixi.js v8 from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>

    <!-- Game scripts (cache-bust via version param) -->
    <script>const v = Date.now();</script>
    <script>
        const scripts = [
            'js/config.js', 'js/path.js', 'js/enemies.js', 'js/projectiles.js',
            'js/towers.js', 'js/renderer.js', 'js/ui.js', 'js/main.js'
        ];
        scripts.forEach(s => document.write(`<script src="${s}?v=${v}"><\/script>`));
    </script>
</body>
</html>
